<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Page not found, Narra Gym</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0b0c10;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #ff6a3d;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(600px circle at 30% 20%, rgba(255, 106, 61, 0.18), transparent 50%),
        radial-gradient(700px circle at 70% 80%, rgba(120, 80, 255, 0.12), transparent 55%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      text-align: center;
      max-width: 520px;
    }

    .code {
      font-family: "Fraunces", serif;
      font-size: clamp(5rem, 18vw, 9rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #ff8a63 0%, #ff6a3d 50%, #c9a4ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 8px;
    }

    h1 {
      font-family: "Fraunces", serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }

    p {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 1.05rem;
    }

    a.back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      background: linear-gradient(135deg, var(--accent), #ff8a63);
      color: #fff;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(255, 106, 61, 0.35);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    a.back:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(255, 106, 61, 0.5);
    }

    a.back svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page is off the path.</h1>
    <p>The page you are looking for has wandered away. Let's get you back to the gym.</p>
    <a href="/" class="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Return home
    </a>
  </div>
</body>
</html>
